apiVersion: 1

# Override du fichier de provisioning built-in de grafana/otel-lgtm.
# Supprime le dashboard JVM (non pertinent pour une API Python).
# Les dashboards RED Metrics sont conservés (utiles pour HTTP rate/error/duration).
providers:
  - name: "RED Metrics (classic histogram)"
    type: file
    options:
      path: /otel-lgtm/grafana-dashboard-red-metrics-classic.json
      foldersFromFilesStructure: false
  - name: "RED Metrics (exponential/native histogram)"
    type: file
    options:
      path: /otel-lgtm/grafana-dashboard-red-metrics-native.json
      foldersFromFilesStructure: false
