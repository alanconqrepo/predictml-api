apiVersion: 1

# Override du fichier de provisioning built-in de grafana/otel-lgtm.
# Supprime les dashboards JVM et RED Metrics (non pertinents pour une API Python).
# Seuls les dashboards custom predictml sont chargés.
providers:
  - name: predictml-api
    orgId: 1
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards
      foldersFromFilesStructure: false
