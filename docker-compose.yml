services:
  # Base de données PostgreSQL (primary — writes)
  postgres:
    image: postgres:16-alpine
    container_name: predictml-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sklearn_api}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    command: >
      postgres
      -c hba_file=/etc/postgresql/pg_hba.conf
      -c wal_level=replica
      -c max_wal_senders=3
      -c wal_keep_size=64
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init_data/create_mlflow_db.sql:/docker-entrypoint-initdb.d/create_mlflow_db.sql:ro
      - ./docker/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5433}:${POSTGRES_INTERNAL_PORT:-5432}"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - internal

  # PostgreSQL read replica — streaming replication from primary (reads analytiques)
  postgres-replica:
    image: postgres:16-alpine
    environment:
      PGDATA: /var/lib/postgresql/data
      PGUSER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_MASTER_HOST: postgres
      POSTGRES_MASTER_PORT: "${POSTGRES_INTERNAL_PORT:-5432}"
    entrypoint: ["/bin/sh", "/docker/postgres-replica-entrypoint.sh"]
    volumes:
      - postgres_replica_data:/var/lib/postgresql/data
      - ./docker/postgres-replica-entrypoint.sh:/docker/postgres-replica-entrypoint.sh:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - internal

  # MinIO pour le stockage des modèles
  minio:
    image: minio/minio:latest
    container_name: predictml-minio
    command: server /data --address ":${MINIO_INTERNAL_PORT:-9000}" --console-address ":${MINIO_CONSOLE_INTERNAL_PORT:-9001}"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?Définissez MINIO_ROOT_USER dans .env}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?Définissez MINIO_ROOT_PASSWORD dans .env}
      MINIO_INTERNAL_PORT: ${MINIO_INTERNAL_PORT:-9000}
      MINIO_CONSOLE_INTERNAL_PORT: ${MINIO_CONSOLE_INTERNAL_PORT:-9001}
    volumes:
      - minio_data:/data
    ports:
      - "127.0.0.1:${MINIO_PORT:-9000}:${MINIO_INTERNAL_PORT:-9000}"
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-9002}:${MINIO_CONSOLE_INTERNAL_PORT:-9001}"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:${MINIO_INTERNAL_PORT:-9000}/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped
    networks:
      - internal

  # Stack Grafana LGTM (Loki + Grafana + Tempo + Prometheus) + OpenTelemetry Collector
  # Activé via ENABLE_OTEL=true — interface Grafana sur http://localhost:3000
  grafana:
    image: grafana/otel-lgtm:latest
    container_name: predictml-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:?Définissez GRAFANA_ADMIN_PASSWORD dans .env}
    ports:
      - "127.0.0.1:${GRAFANA_PORT:-3000}:3000"                                              # Grafana UI
      - "127.0.0.1:${GRAFANA_GRPC_PORT:-4317}:${GRAFANA_GRPC_PORT:-4317}"                   # OTLP gRPC receiver
      - "127.0.0.1:${GRAFANA_OTLP_HTTP_PORT:-4318}:${GRAFANA_OTLP_HTTP_PORT:-4318}"         # OTLP HTTP receiver
    volumes:
      - grafana_data:/data
      - ./monitoring/prometheus.yml:/otel-lgtm/prometheus.yaml:ro
      - ./monitoring/grafana/provisioning.yaml:/etc/grafana/provisioning/datasources/predictml.yaml:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    restart: unless-stopped
    networks:
      - internal

  # Redis Sentinel — haute disponibilité (1 master + 2 replicas + 3 sentinels)
  # Basculement automatique en < 10 s si le master tombe (quorum : 2 sentinels).
  redis-master:
    image: redis:7-alpine
    container_name: predictml-redis-master
    command: redis-server --requirepass ${REDIS_PASSWORD:?Définissez REDIS_PASSWORD dans .env} --port ${REDIS_PORT:-6379}
    environment:
      - REDIS_PORT=${REDIS_PORT:-6379}
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:${REDIS_PORT:-6379}"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli --no-auth-warning -a $$REDIS_PASSWORD -p ${REDIS_PORT:-6379} ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - internal

  redis-replica-1:
    image: redis:7-alpine
    command: >-
      redis-server
      --port ${REDIS_PORT:-6379}
      --replicaof redis-master ${REDIS_PORT:-6379}
      --requirepass ${REDIS_PASSWORD:?Définissez REDIS_PASSWORD dans .env}
      --masterauth ${REDIS_PASSWORD:?Définissez REDIS_PASSWORD dans .env}
    depends_on:
      redis-master:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - internal

  redis-replica-2:
    image: redis:7-alpine
    command: >-
      redis-server
      --port ${REDIS_PORT:-6379}
      --replicaof redis-master ${REDIS_PORT:-6379}
      --requirepass ${REDIS_PASSWORD:?Définissez REDIS_PASSWORD dans .env}
      --masterauth ${REDIS_PASSWORD:?Définissez REDIS_PASSWORD dans .env}
    depends_on:
      redis-master:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - internal

  redis-sentinel-1:
    image: redis:7-alpine
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:?Définissez REDIS_PASSWORD dans .env}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_SENTINEL_PORT=${REDIS_SENTINEL_PORT:-26379}
    volumes:
      - ./docker/sentinel-entrypoint.sh:/docker-entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/docker-entrypoint.sh"]
    depends_on:
      redis-master:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -p ${REDIS_SENTINEL_PORT:-26379} ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - internal

  redis-sentinel-2:
    image: redis:7-alpine
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:?Définissez REDIS_PASSWORD dans .env}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_SENTINEL_PORT=${REDIS_SENTINEL_PORT:-26379}
    volumes:
      - ./docker/sentinel-entrypoint.sh:/docker-entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/docker-entrypoint.sh"]
    depends_on:
      redis-master:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -p ${REDIS_SENTINEL_PORT:-26379} ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - internal

  redis-sentinel-3:
    image: redis:7-alpine
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:?Définissez REDIS_PASSWORD dans .env}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_SENTINEL_PORT=${REDIS_SENTINEL_PORT:-26379}
    volumes:
      - ./docker/sentinel-entrypoint.sh:/docker-entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/docker-entrypoint.sh"]
    depends_on:
      redis-master:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -p ${REDIS_SENTINEL_PORT:-26379} ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - internal

  # PgBouncer — connection pooler PostgreSQL (primary / writes)
  pgbouncer:
    image: pgbouncer/pgbouncer:latest
    container_name: predictml-pgbouncer
    environment:
      DATABASES_HOST: postgres
      DATABASES_PORT: "${POSTGRES_INTERNAL_PORT:-5432}"
      DATABASES_USER: ${POSTGRES_USER:-postgres}
      DATABASES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DATABASES_DBNAME: ${POSTGRES_DB:-sklearn_api}
      PGBOUNCER_PORT: "${PGBOUNCER_PORT:-6432}"
      POOL_MODE: transaction
      MAX_CLIENT_CONN: "200"
      DEFAULT_POOL_SIZE: "20"
      SERVER_RESET_QUERY: DISCARD ALL
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 ${PGBOUNCER_PORT:-6432} || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - internal

  # PgBouncer — connection pooler for read replica (analytics / reads)
  pgbouncer-read:
    image: pgbouncer/pgbouncer:latest
    environment:
      DATABASES_HOST: postgres-replica
      DATABASES_PORT: "${POSTGRES_INTERNAL_PORT:-5432}"
      DATABASES_USER: ${POSTGRES_USER:-postgres}
      DATABASES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DATABASES_DBNAME: ${POSTGRES_DB:-sklearn_api}
      PGBOUNCER_PORT: "${PGBOUNCER_PORT:-6432}"
      POOL_MODE: transaction
      MAX_CLIENT_CONN: "100"
      DEFAULT_POOL_SIZE: "10"
      SERVER_RESET_QUERY: DISCARD ALL
    depends_on:
      postgres-replica:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 ${PGBOUNCER_PORT:-6432} || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - internal

  # Migration one-shot — s'exécute avant l'API, ne redémarre pas
  migrate:
    build: .
    command: alembic upgrade head
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:${POSTGRES_INTERNAL_PORT:-5432}/${POSTGRES_DB:-sklearn_api}
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:?Définissez MINIO_ROOT_USER dans .env}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD:?Définissez MINIO_ROOT_PASSWORD dans .env}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    networks:
      - internal

  # Seed des données exemples (one-shot — ignoré si déjà présent)
  seed-data:
    build: .
    command: python init_data/seed_sample_data.py
    volumes:
      - ./documentation/Scripts:/app/documentation/Scripts:ro
    env_file:
      - .env
    environment:
      - API_URL=http://api:${API_PORT:-8000}
      - API_TOKEN=${ADMIN_TOKEN:-}
      - MLFLOW_TRACKING_URI=http://mlflow:${MLFLOW_PORT:-5000}
      - MLFLOW_TRACKING_USERNAME=${MLFLOW_ADMIN_USER:-admin}
      - MLFLOW_TRACKING_PASSWORD=${MLFLOW_ADMIN_PASSWORD:-}
      - MLFLOW_S3_ENDPOINT_URL=http://minio:${MINIO_INTERNAL_PORT:-9000}
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER:?Définissez MINIO_ROOT_USER dans .env}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD:?Définissez MINIO_ROOT_PASSWORD dans .env}
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:?Définissez MINIO_ROOT_USER dans .env}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:?Définissez MINIO_ROOT_PASSWORD dans .env}
    depends_on:
      api:
        condition: service_healthy
    restart: "no"
    networks:
      - internal

  # Reverse proxy Nginx
  nginx:
    image: nginx:1.27-alpine
    container_name: predictml-nginx
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - frontend

  # API FastAPI
  api:
    build: .
    volumes:
      - ./src:/app/src
    deploy:
      replicas: 3
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@pgbouncer:${PGBOUNCER_PORT:-6432}/${POSTGRES_DB:-sklearn_api}
      - DATABASE_READ_REPLICA_URL=postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@pgbouncer-read:${PGBOUNCER_PORT:-6432}/${POSTGRES_DB:-sklearn_api}
      - MINIO_ENDPOINT=minio:${MINIO_INTERNAL_PORT:-9000}
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:?Définissez MINIO_ROOT_USER dans .env}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD:?Définissez MINIO_ROOT_PASSWORD dans .env}
      - MINIO_BUCKET=${MINIO_BUCKET:-models}
      - ADMIN_TOKEN=${ADMIN_TOKEN:-}
      - ENABLE_OTEL=${ENABLE_OTEL:-true}
      - OTEL_SERVICE_NAME=${OTEL_SERVICE_NAME:-predictml-api}
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://grafana:${GRAFANA_GRPC_PORT:-4317}
      - REDIS_URL=redis://:${REDIS_PASSWORD:?Définissez REDIS_PASSWORD dans .env}@redis-master:${REDIS_PORT:-6379}/0
      - REDIS_SENTINEL_HOSTS=redis-sentinel-1:${REDIS_SENTINEL_PORT:-26379},redis-sentinel-2:${REDIS_SENTINEL_PORT:-26379},redis-sentinel-3:${REDIS_SENTINEL_PORT:-26379}
      - REDIS_CACHE_TTL=${REDIS_CACHE_TTL:-3600}
      - PREDICTION_STREAM_ENABLED=true
      - METRICS_TOKEN=${METRICS_TOKEN:-}
      - PROMETHEUS_MULTIPROC_DIR=/tmp/prometheus_multiproc
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - MLFLOW_TRACKING_URI=http://mlflow:${MLFLOW_PORT:-5000}
      - MLFLOW_TRACKING_USERNAME=${MLFLOW_ADMIN_USER:-admin}
      - MLFLOW_TRACKING_PASSWORD=${MLFLOW_ADMIN_PASSWORD:-}
      - MLFLOW_S3_ENDPOINT_URL=http://minio:${MINIO_INTERNAL_PORT:-9000}
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER:?Définissez MINIO_ROOT_USER dans .env}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD:?Définissez MINIO_ROOT_PASSWORD dans .env}
      # --- Alertes e-mail (optionnel — configurer dans .env pour activer) ---
      - ENABLE_EMAIL_ALERTS=${ENABLE_EMAIL_ALERTS:-false}
      - WEEKLY_REPORT_ENABLED=${WEEKLY_REPORT_ENABLED:-false}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_STARTTLS=${SMTP_STARTTLS:-true}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM=${SMTP_FROM:-}
      - ALERT_EMAIL_TO=${ALERT_EMAIL_TO:-}
      - STREAMLIT_URL=http://localhost:${STREAMLIT_PORT:-8501}
      - WEEKLY_REPORT_DAY=${WEEKLY_REPORT_DAY:-monday}
      - WEEKLY_REPORT_HOUR=${WEEKLY_REPORT_HOUR:-8}
      - PERFORMANCE_DRIFT_ALERT_THRESHOLD=${PERFORMANCE_DRIFT_ALERT_THRESHOLD:-0.10}
      - ERROR_RATE_ALERT_THRESHOLD=${ERROR_RATE_ALERT_THRESHOLD:-0.10}
    depends_on:
      migrate:
        condition: service_completed_successfully
      pgbouncer:
        condition: service_healthy
      pgbouncer-read:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis-sentinel-1:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${API_PORT:-8000}/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - internal
      - frontend

  # Worker — consommateur Redis Stream, batch INSERT en DB
  prediction-writer:
    build: .
    command: python -m src.workers.prediction_writer
    volumes:
      - ./src:/app/src
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 128M
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@pgbouncer:${PGBOUNCER_PORT:-6432}/${POSTGRES_DB:-sklearn_api}
      - REDIS_URL=redis://:${REDIS_PASSWORD:?Définissez REDIS_PASSWORD dans .env}@redis-master:${REDIS_PORT:-6379}/0
      - REDIS_SENTINEL_HOSTS=redis-sentinel-1:${REDIS_SENTINEL_PORT:-26379},redis-sentinel-2:${REDIS_SENTINEL_PORT:-26379},redis-sentinel-3:${REDIS_SENTINEL_PORT:-26379}
      - SECRET_KEY=${SECRET_KEY:?Définissez SECRET_KEY dans .env}
      - PREDICTION_STREAM_ENABLED=true
      - PREDICTION_STREAM_BATCH_SIZE=${PREDICTION_STREAM_BATCH_SIZE:-100}
      - PREDICTION_STREAM_FLUSH_MS=${PREDICTION_STREAM_FLUSH_MS:-500}
      - PREDICTION_STREAM_MAX_RETRIES=${PREDICTION_STREAM_MAX_RETRIES:-3}
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis-sentinel-1:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - internal

  # MLflow Tracking Server
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.20.2
    container_name: predictml-mlflow
    entrypoint: ["/bin/sh", "/docker/mlflow-entrypoint.sh"]
    environment:
      - MLFLOW_S3_ENDPOINT_URL=http://minio:${MINIO_INTERNAL_PORT:-9000}
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER:?Définissez MINIO_ROOT_USER dans .env}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD:?Définissez MINIO_ROOT_PASSWORD dans .env}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_INTERNAL_PORT=${POSTGRES_INTERNAL_PORT:-5432}
      - MLFLOW_PORT=${MLFLOW_PORT:-5000}
      - MLFLOW_ADMIN_USER=${MLFLOW_ADMIN_USER:-admin}
      - MLFLOW_ADMIN_PASSWORD=${MLFLOW_ADMIN_PASSWORD:?Définissez MLFLOW_ADMIN_PASSWORD dans .env}
      - MLFLOW_FLASK_SERVER_SECRET_KEY=${MLFLOW_FLASK_SERVER_SECRET_KEY:?Définissez MLFLOW_FLASK_SERVER_SECRET_KEY dans .env}
    volumes:
      - ./docker/mlflow-entrypoint.sh:/docker/mlflow-entrypoint.sh:ro
    ports:
      - "127.0.0.1:${MLFLOW_PORT:-5000}:${MLFLOW_PORT:-5000}"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - internal

  # Dashboard Streamlit
  streamlit:
    build:
      context: ./streamlit_app
      dockerfile: Dockerfile
    container_name: predictml-streamlit
    ports:
      - "${STREAMLIT_PORT:-8501}:${STREAMLIT_PORT:-8501}"
    environment:
      - API_URL=http://api:${API_PORT:-8000}
      - MLFLOW_URL=http://mlflow:${MLFLOW_PORT:-5000}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - HOME=/tmp
      # Connexion PostgreSQL pour le tool SQL du chatbot
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=${POSTGRES_INTERNAL_PORT:-5432}
      - POSTGRES_DB=${POSTGRES_DB:-sklearn_api}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
    volumes:
      - ./streamlit_app:/app
      - ./documentation:/app/documentation:ro
      - ./src:/app/src:ro
      - ./init_data:/app/init_data:ro
      - ./README.md:/app/README.md:ro
      - ./CODING_STANDARDS.md:/app/CODING_STANDARDS.md:ro
    depends_on:
      api:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - internal
      - frontend

volumes:
  postgres_data:
    driver: local
  postgres_replica_data:
    driver: local
  minio_data:
    driver: local
  grafana_data:
    driver: local

networks:
  internal:
    driver: bridge
  frontend:
    driver: bridge
