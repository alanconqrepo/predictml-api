services:
  # Base de données PostgreSQL (primary — writes)
  postgres:
    image: postgres:16-alpine
    container_name: predictml-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    command: >
      postgres
      -c hba_file=/etc/postgresql/pg_hba.conf
      -c wal_level=replica
      -c max_wal_senders=3
      -c wal_keep_size=64
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init_data/create_mlflow_db.sql:/docker-entrypoint-initdb.d/create_mlflow_db.sql:ro
      - ./docker/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
    ports:
      - "127.0.0.1:${POSTGRES_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - internal

  # PostgreSQL read replica — streaming replication from primary (reads analytiques)
  postgres-replica:
    image: postgres:16-alpine
    environment:
      PGDATA: /var/lib/postgresql/data
      PGUSER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_MASTER_HOST: postgres
      POSTGRES_MASTER_PORT: "5432"
    entrypoint: ["/bin/sh", "/docker/postgres-replica-entrypoint.sh"]
    volumes:
      - postgres_replica_data:/var/lib/postgresql/data
      - ./docker/postgres-replica-entrypoint.sh:/docker/postgres-replica-entrypoint.sh:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - internal

  # MinIO pour le stockage des modèles
  minio:
    image: minio/minio:latest
    container_name: predictml-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?Définissez MINIO_ROOT_USER dans .env}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?Définissez MINIO_ROOT_PASSWORD dans .env}
    volumes:
      - minio_data:/data
    ports:
      - "127.0.0.1:${MINIO_PORT}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_PORT}:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped
    networks:
      - internal

  # Stack Grafana LGTM (Loki + Grafana + Tempo + Prometheus) + OpenTelemetry Collector
  # Activé via ENABLE_OTEL=true — interface Grafana sur http://localhost:3000
  grafana:
    image: grafana/otel-lgtm:latest
    container_name: predictml-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:?Définissez GRAFANA_ADMIN_PASSWORD dans .env}
    ports:
      - "127.0.0.1:3000:3000"   # Grafana UI
      - "127.0.0.1:4317:4317"   # OTLP gRPC receiver
      - "127.0.0.1:4318:4318"   # OTLP HTTP receiver
    volumes:
      - grafana_data:/data
      - ./monitoring/prometheus.yml:/otel-lgtm/prometheus.yaml:ro
      - ./monitoring/grafana/provisioning.yaml:/etc/grafana/provisioning/datasources/predictml.yaml:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    restart: unless-stopped
    networks:
      - internal

  # Redis Sentinel — haute disponibilité (1 master + 2 replicas + 3 sentinels)
  # Basculement automatique en < 10 s si le master tombe (quorum : 2 sentinels).
  redis-master:
    image: redis:7-alpine
    container_name: predictml-redis-master
    command: redis-server --requirepass ${REDIS_PASSWORD:?Définissez REDIS_PASSWORD dans .env}
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli --no-auth-warning -a $$REDIS_PASSWORD ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - internal

  redis-replica-1:
    image: redis:7-alpine
    command: >-
      redis-server
      --replicaof redis-master 6379
      --requirepass ${REDIS_PASSWORD:?Définissez REDIS_PASSWORD dans .env}
      --masterauth ${REDIS_PASSWORD:?Définissez REDIS_PASSWORD dans .env}
    depends_on:
      redis-master:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - internal

  redis-replica-2:
    image: redis:7-alpine
    command: >-
      redis-server
      --replicaof redis-master 6379
      --requirepass ${REDIS_PASSWORD:?Définissez REDIS_PASSWORD dans .env}
      --masterauth ${REDIS_PASSWORD:?Définissez REDIS_PASSWORD dans .env}
    depends_on:
      redis-master:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - internal

  redis-sentinel-1:
    image: redis:7-alpine
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:?Définissez REDIS_PASSWORD dans .env}
    volumes:
      - ./docker/sentinel-entrypoint.sh:/docker-entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/docker-entrypoint.sh"]
    depends_on:
      redis-master:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "26379", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - internal

  redis-sentinel-2:
    image: redis:7-alpine
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:?Définissez REDIS_PASSWORD dans .env}
    volumes:
      - ./docker/sentinel-entrypoint.sh:/docker-entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/docker-entrypoint.sh"]
    depends_on:
      redis-master:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "26379", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - internal

  redis-sentinel-3:
    image: redis:7-alpine
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:?Définissez REDIS_PASSWORD dans .env}
    volumes:
      - ./docker/sentinel-entrypoint.sh:/docker-entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/docker-entrypoint.sh"]
    depends_on:
      redis-master:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "26379", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - internal

  # PgBouncer — connection pooler PostgreSQL (primary / writes)
  pgbouncer:
    image: pgbouncer/pgbouncer:1.23
    container_name: predictml-pgbouncer
    environment:
      DATABASES_HOST: postgres
      DATABASES_PORT: "5432"
      DATABASES_USER: ${POSTGRES_USER}
      DATABASES_PASSWORD: ${POSTGRES_PASSWORD}
      DATABASES_DBNAME: ${POSTGRES_DB}
      POOL_MODE: transaction
      MAX_CLIENT_CONN: "200"
      DEFAULT_POOL_SIZE: "20"
      SERVER_RESET_QUERY: DISCARD ALL
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432 -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - internal

  # PgBouncer — connection pooler for read replica (analytics / reads)
  pgbouncer-read:
    image: pgbouncer/pgbouncer:1.23
    environment:
      DATABASES_HOST: postgres-replica
      DATABASES_PORT: "5432"
      DATABASES_USER: ${POSTGRES_USER}
      DATABASES_PASSWORD: ${POSTGRES_PASSWORD}
      DATABASES_DBNAME: ${POSTGRES_DB}
      POOL_MODE: transaction
      MAX_CLIENT_CONN: "100"
      DEFAULT_POOL_SIZE: "10"
      SERVER_RESET_QUERY: DISCARD ALL
    depends_on:
      postgres-replica:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432 -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - internal

  # Migration one-shot — s'exécute avant l'API, ne redémarre pas
  migrate:
    build: .
    command: alembic upgrade head
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    networks:
      - internal

  # Reverse proxy Nginx
  nginx:
    image: nginx:1.27-alpine
    container_name: predictml-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - frontend

  # API FastAPI
  api:
    build: .
    deploy:
      replicas: 3
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pgbouncer:5432/${POSTGRES_DB}
      - DATABASE_READ_REPLICA_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pgbouncer-read:5432/${POSTGRES_DB}
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:?Définissez MINIO_ROOT_USER dans .env}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD:?Définissez MINIO_ROOT_PASSWORD dans .env}
      - MINIO_BUCKET=${MINIO_BUCKET}
      - ADMIN_TOKEN=${ADMIN_TOKEN:-}
      - ENABLE_OTEL=${ENABLE_OTEL}
      - OTEL_SERVICE_NAME=${OTEL_SERVICE_NAME}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT}
      - REDIS_URL=redis://:${REDIS_PASSWORD:?Définissez REDIS_PASSWORD dans .env}@redis-master:6379/0
      - REDIS_SENTINEL_HOSTS=redis-sentinel-1:26379,redis-sentinel-2:26379,redis-sentinel-3:26379
      - REDIS_CACHE_TTL=${REDIS_CACHE_TTL}
      - PREDICTION_STREAM_ENABLED=true
      - METRICS_TOKEN=${METRICS_TOKEN:-}
      - PROMETHEUS_MULTIPROC_DIR=/tmp/prometheus_multiproc
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - MLFLOW_TRACKING_URI=${MLFLOW_TRACKING_URI}
      # --- Alertes e-mail (optionnel — décommentez et configurez pour activer) ---
      # - ENABLE_EMAIL_ALERTS=false
      # - WEEKLY_REPORT_ENABLED=false
      # - SMTP_HOST=smtp.gmail.com
      # - SMTP_PORT=587
      # - SMTP_STARTTLS=true
      # - SMTP_USER=alerts@company.com
      # - SMTP_PASSWORD=secret
      # - SMTP_FROM=alerts@predictml.io
      # - ALERT_EMAIL_TO=admin@company.com
      # - STREAMLIT_URL=http://localhost:8501
      # - WEEKLY_REPORT_DAY=monday
      # - WEEKLY_REPORT_HOUR=8
      # - PERFORMANCE_DRIFT_ALERT_THRESHOLD=0.10
      # - ERROR_RATE_ALERT_THRESHOLD=0.10
    depends_on:
      migrate:
        condition: service_completed_successfully
      pgbouncer:
        condition: service_healthy
      pgbouncer-read:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis-sentinel-1:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - internal
      - frontend

  # Worker — consommateur Redis Stream, batch INSERT en DB
  prediction-writer:
    build: .
    command: python -m src.workers.prediction_writer
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 128M
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pgbouncer:5432/${POSTGRES_DB}
      - REDIS_URL=redis://:${REDIS_PASSWORD:?Définissez REDIS_PASSWORD dans .env}@redis-master:6379/0
      - REDIS_SENTINEL_HOSTS=redis-sentinel-1:26379,redis-sentinel-2:26379,redis-sentinel-3:26379
      - SECRET_KEY=${SECRET_KEY:?Définissez SECRET_KEY dans .env}
      - PREDICTION_STREAM_ENABLED=true
      - PREDICTION_STREAM_BATCH_SIZE=${PREDICTION_STREAM_BATCH_SIZE}
      - PREDICTION_STREAM_FLUSH_MS=${PREDICTION_STREAM_FLUSH_MS}
      - PREDICTION_STREAM_MAX_RETRIES=${PREDICTION_STREAM_MAX_RETRIES}
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis-sentinel-1:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - internal

  # MLflow Tracking Server
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.20.2
    container_name: predictml-mlflow
    command: >
      bash -c "pip install psycopg2-binary boto3 --quiet &&
      mlflow server
      --backend-store-uri postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/mlflow
      --default-artifact-root s3://mlflow/
      --host 0.0.0.0
      --port 5000"
    environment:
      - MLFLOW_S3_ENDPOINT_URL=http://minio:9000
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER:?Définissez MINIO_ROOT_USER dans .env}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD:?Définissez MINIO_ROOT_PASSWORD dans .env}
    ports:
      - "127.0.0.1:5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - internal

  # Dashboard Streamlit
  streamlit:
    build:
      context: ./streamlit_app
      dockerfile: Dockerfile
    container_name: predictml-streamlit
    ports:
      - "${STREAMLIT_PORT}:8501"
    environment:
      - API_URL=http://api:8000
      - MLFLOW_URL=http://mlflow:5000
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      # Connexion PostgreSQL pour le tool SQL du chatbot
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - ./documentation:/app/documentation:ro
      - ./src:/app/src:ro
      - ./init_data:/app/init_data:ro
      - ./README.md:/app/README.md:ro
      - ./CODING_STANDARDS.md:/app/CODING_STANDARDS.md:ro
    depends_on:
      api:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - internal
      - frontend

volumes:
  postgres_data:
    driver: local
  postgres_replica_data:
    driver: local
  minio_data:
    driver: local
  grafana_data:
    driver: local

networks:
  internal:
    driver: bridge
  frontend:
    driver: bridge
