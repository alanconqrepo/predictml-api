services:
  # Base de données PostgreSQL
  postgres:
    image: postgres:16-alpine
    container_name: predictml-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sklearn_api}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init_data/create_mlflow_db.sql:/docker-entrypoint-initdb.d/create_mlflow_db.sql:ro
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # MinIO pour le stockage des modèles
  minio:
    image: minio/minio:latest
    container_name: predictml-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped

  # Stack Grafana LGTM (Loki + Grafana + Tempo + Prometheus) + OpenTelemetry Collector
  # Activé via ENABLE_OTEL=true — interface Grafana sur http://localhost:3000
  grafana:
    image: grafana/otel-lgtm:latest
    container_name: predictml-grafana
    ports:
      - "3000:3000"   # Grafana UI (admin/admin)
      - "4317:4317"   # OTLP gRPC receiver
      - "4318:4318"   # OTLP HTTP receiver
    volumes:
      - grafana_data:/data
      - ./monitoring/prometheus.yml:/otel-lgtm/prometheus.yaml:ro
    restart: unless-stopped

  # Cache Redis — partagé entre les instances API (multi-pod)
  redis:
    image: redis:7-alpine
    container_name: predictml-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # API FastAPI
  api:
    build: .
    container_name: predictml-api
    ports:
      - "${API_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-sklearn_api}
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minioadmin}
      - MINIO_BUCKET=${MINIO_BUCKET:-models}
      - ADMIN_TOKEN=${ADMIN_TOKEN:-}
      - ENABLE_OTEL=${ENABLE_OTEL:-false}
      - OTEL_SERVICE_NAME=${OTEL_SERVICE_NAME:-predictml-api}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://grafana:4317}
      - REDIS_URL=redis://redis:6379/0
      - REDIS_CACHE_TTL=${REDIS_CACHE_TTL:-3600}
      - METRICS_TOKEN=${METRICS_TOKEN:-}
      - PROMETHEUS_MULTIPROC_DIR=/tmp/prometheus_multiproc
      # --- Alertes e-mail (optionnel — décommentez et configurez pour activer) ---
      # - ENABLE_EMAIL_ALERTS=false
      # - WEEKLY_REPORT_ENABLED=false
      # - SMTP_HOST=smtp.gmail.com
      # - SMTP_PORT=587
      # - SMTP_STARTTLS=true
      # - SMTP_USER=alerts@company.com
      # - SMTP_PASSWORD=secret
      # - SMTP_FROM=alerts@predictml.io
      # - ALERT_EMAIL_TO=admin@company.com
      # - STREAMLIT_URL=http://localhost:8501
      # - WEEKLY_REPORT_DAY=monday
      # - WEEKLY_REPORT_HOUR=8
      # - PERFORMANCE_DRIFT_ALERT_THRESHOLD=0.10
      # - ERROR_RATE_ALERT_THRESHOLD=0.10
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # MLflow Tracking Server
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.20.2
    container_name: predictml-mlflow
    command: >
      bash -c "pip install psycopg2-binary boto3 --quiet &&
      mlflow server
      --backend-store-uri postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/mlflow
      --default-artifact-root s3://mlflow/
      --host 0.0.0.0
      --port 5000"
    environment:
      - MLFLOW_S3_ENDPOINT_URL=http://minio:9000
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER:-minioadmin}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  # Dashboard Streamlit
  streamlit:
    build:
      context: ./streamlit_app
      dockerfile: Dockerfile
    container_name: predictml-streamlit
    ports:
      - "${STREAMLIT_PORT:-8501}:8501"
    environment:
      - API_URL=http://api:8000
      - MLFLOW_URL=http://mlflow:5000
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  minio_data:
    driver: local
  grafana_data:
    driver: local
