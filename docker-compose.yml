services:
  # Base de données PostgreSQL
  postgres:
    image: postgres:16-alpine
    container_name: predictml-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sklearn_api}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init_data/create_mlflow_db.sql:/docker-entrypoint-initdb.d/create_mlflow_db.sql:ro
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - internal

  # MinIO pour le stockage des modèles
  minio:
    image: minio/minio:latest
    container_name: predictml-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?Définissez MINIO_ROOT_USER dans .env}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?Définissez MINIO_ROOT_PASSWORD dans .env}
    volumes:
      - minio_data:/data
    ports:
      - "127.0.0.1:${MINIO_PORT:-9000}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped
    networks:
      - internal

  # Stack Grafana LGTM (Loki + Grafana + Tempo + Prometheus) + OpenTelemetry Collector
  # Activé via ENABLE_OTEL=true — interface Grafana sur http://localhost:3000
  grafana:
    image: grafana/otel-lgtm:latest
    container_name: predictml-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:?Définissez GRAFANA_ADMIN_PASSWORD dans .env}
    ports:
      - "127.0.0.1:3000:3000"   # Grafana UI
      - "127.0.0.1:4317:4317"   # OTLP gRPC receiver
      - "127.0.0.1:4318:4318"   # OTLP HTTP receiver
    volumes:
      - grafana_data:/data
      - ./monitoring/prometheus.yml:/otel-lgtm/prometheus.yaml:ro
      - ./monitoring/grafana/provisioning.yaml:/etc/grafana/provisioning/datasources/predictml.yaml:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    restart: unless-stopped
    networks:
      - internal

  # Cache Redis — partagé entre les instances API (multi-pod)
  redis:
    image: redis:7-alpine
    container_name: predictml-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:?Définissez REDIS_PASSWORD dans .env}
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli --no-auth-warning -a $$REDIS_PASSWORD ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - internal

  # Migration one-shot — s'exécute avant l'API, ne redémarre pas
  migrate:
    build: .
    command: alembic upgrade head
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-sklearn_api}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    networks:
      - internal

  # Reverse proxy Nginx
  nginx:
    image: nginx:1.27-alpine
    container_name: predictml-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - frontend

  # API FastAPI
  api:
    build: .
    container_name: predictml-api
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-sklearn_api}
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:?Définissez MINIO_ROOT_USER dans .env}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD:?Définissez MINIO_ROOT_PASSWORD dans .env}
      - MINIO_BUCKET=${MINIO_BUCKET:-models}
      - ADMIN_TOKEN=${ADMIN_TOKEN:-}
      - ENABLE_OTEL=${ENABLE_OTEL:-true}
      - OTEL_SERVICE_NAME=${OTEL_SERVICE_NAME:-predictml-api}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://grafana:4317}
      - REDIS_URL=redis://:${REDIS_PASSWORD:?Définissez REDIS_PASSWORD dans .env}@redis:6379/0
      - REDIS_CACHE_TTL=${REDIS_CACHE_TTL:-3600}
      - METRICS_TOKEN=${METRICS_TOKEN:-}
      - PROMETHEUS_MULTIPROC_DIR=/tmp/prometheus_multiproc
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - MLFLOW_TRACKING_URI=${MLFLOW_TRACKING_URI:-http://mlflow:5000}
      # --- Alertes e-mail (optionnel — décommentez et configurez pour activer) ---
      # - ENABLE_EMAIL_ALERTS=false
      # - WEEKLY_REPORT_ENABLED=false
      # - SMTP_HOST=smtp.gmail.com
      # - SMTP_PORT=587
      # - SMTP_STARTTLS=true
      # - SMTP_USER=alerts@company.com
      # - SMTP_PASSWORD=secret
      # - SMTP_FROM=alerts@predictml.io
      # - ALERT_EMAIL_TO=admin@company.com
      # - STREAMLIT_URL=http://localhost:8501
      # - WEEKLY_REPORT_DAY=monday
      # - WEEKLY_REPORT_HOUR=8
      # - PERFORMANCE_DRIFT_ALERT_THRESHOLD=0.10
      # - ERROR_RATE_ALERT_THRESHOLD=0.10
    depends_on:
      migrate:
        condition: service_completed_successfully
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - internal
      - frontend

  # MLflow Tracking Server
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.20.2
    container_name: predictml-mlflow
    command: >
      bash -c "pip install psycopg2-binary boto3 --quiet &&
      mlflow server
      --backend-store-uri postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/mlflow
      --default-artifact-root s3://mlflow/
      --host 0.0.0.0
      --port 5000"
    environment:
      - MLFLOW_S3_ENDPOINT_URL=http://minio:9000
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER:?Définissez MINIO_ROOT_USER dans .env}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD:?Définissez MINIO_ROOT_PASSWORD dans .env}
    ports:
      - "127.0.0.1:5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - internal

  # Dashboard Streamlit
  streamlit:
    build:
      context: ./streamlit_app
      dockerfile: Dockerfile
    container_name: predictml-streamlit
    ports:
      - "${STREAMLIT_PORT:-8501}:8501"
    environment:
      - API_URL=http://api:8000
      - MLFLOW_URL=http://mlflow:5000
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      # Connexion PostgreSQL pour le tool SQL du chatbot
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-sklearn_api}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
    volumes:
      - ./documentation:/app/documentation:ro
      - ./src:/app/src:ro
      - ./init_data:/app/init_data:ro
      - ./README.md:/app/README.md:ro
      - ./CODING_STANDARDS.md:/app/CODING_STANDARDS.md:ro
    depends_on:
      api:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - internal
      - frontend

volumes:
  postgres_data:
    driver: local
  minio_data:
    driver: local
  grafana_data:
    driver: local

networks:
  internal:
    driver: bridge
  frontend:
    driver: bridge
