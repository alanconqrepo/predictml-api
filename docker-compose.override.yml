services:
  mlflow:
    image: predictml-mlflow:local
    build:
      context: ./docker/mlflow
      dockerfile: Dockerfile

  api:
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
