metrics:
  predictions_prod: >-
    Production predictions returned to clients (is_shadow=False) over the period.
    Does not include shadow executions.
  shadow_predictions: >-
    Silent predictions computed in the background (is_shadow=True),
    not returned to the client.

    Used to compare new versions against production
    without affecting real traffic.
  modeles_actifs: >-
    Number of distinct models with at least one active version (is_active=True)
    with predictions in the selected period.

    A model is "active" as soon as a version is loadable,
    regardless of its deployment mode (Production, A/B, Shadow, or no routing).

    Not to be confused with "in production": an active model may only be
    in shadow or uploaded without being exposed to traffic.
  alertes_sante: >-
    Number of models in alert over the period.

    Each model's health status is the worst of 4 indicators:

    • Execution error rate
      🟡 ≥ 5%  ·  🔴 ≥ 10%

    • Feature drift (Z-score + PSI + null rate)
      Z-score 🟡 ≥ 2  · 🔴 ≥ 3
      PSI 🟡 ≥ 0.1  ·  🔴 ≥ 0.2
      Null rate 🟡 gap ≥ 5 pts  ·  🔴 ≥ 15 pts or > 30%

    • Performance drift (accuracy 1st vs 2nd half of period)
      🟡 drop ≥ 5 pts  ·  🔴 drop ≥ 10 pts

    • Output drift (PSI of prediction distribution)
      🟡 PSI ≥ 0.1  ·  🔴 PSI ≥ 0.2

    The final status is the most severe of these four.
    ⚪ no_data / no_baseline does not degrade the global status.
  taux_erreur: >-
    Proportion of requests that failed execution over the period.

    ⚠️ This is NOT an ML quality indicator: a prediction may be
    correctly computed and returned to the client, yet wrong on a business level.

    An execution error means the API could not produce a prediction
    (server exception, model not loaded, timeout, invalid input…).
    Computed on production predictions only (excluding shadow).

    🟡 Warning: ≥ 5%  ·  🔴 Critical: ≥ 10%
  accuracy: "Proportion of correct predictions. 1.0 = 100% correct predictions."
  auc: >-
    AUC-ROC (Area Under the ROC Curve): area under the Receiver Operating Characteristic curve.

    Measures the model's ability to distinguish classes, independently of the decision threshold.

    • 1.0 = perfect discriminant
    • 0.5 = no better than chance (random classifier)
    • < 0.5 = worse than chance

    Interpretation:
    • 🟢 ≥ 0.90 → excellent
    • 🟡 0.70–0.90 → good to acceptable
    • 🔴 < 0.70 → needs improvement

    Requires predicted probabilities (model must output confidence scores, not just a class).
    Binary classification: standard AUC. Multiclass: OvR (One vs Rest) weighted.
  mae: "Mean Absolute Error: average absolute deviation between prediction and actual value. Lower is better."
  rmse: "Root Mean Square Error: square root of the mean squared error. Penalises large errors more than MAE."
  r2: "Coefficient of determination: share of variance explained by the model. 1.0 = perfect model, 0 = null model, negative = worse than average."
  precision: "Among positive predictions, proportion that are truly positive. Evaluates the reliability of positive detections. (w.) = weighted average per class."
  recall: "Among real positive cases, proportion correctly detected. Evaluates the ability not to miss positive cases. (w.) = weighted average per class."
  f1: "Harmonic mean of precision and recall. Useful when classes are imbalanced. (w.) = weighted average per class."
  latence_mediane: "Median response time: half of all requests have a time below this value."
  latence_avg: "Average response time across all requests."
  latence_p95: "95th percentile latency: 95% of requests are processed in less than this time. Key production performance indicator."
  concordance_shadow: "Agreement rate between the shadow model and the production model: proportion of cases where both models give the same prediction."
  p_value: "Probability of observing a difference this large if the two versions were equivalent. Below the threshold (e.g. 0.05) → statistically significant difference."
  niveau_confiance: "Confidence level of the test. 95% means: we accept a 5% risk of wrongly concluding there is a difference when there is none."
  test_statistique: "Statistical test used to compare versions. Chi-² for error rates (proportions), Mann-Whitney U for latency distributions (continuous)."
  metrique_analysee: "Metric on which the statistical test is performed: error rate or response time."
  brier_score: "Brier score: measures the accuracy of predicted probabilities. 0 = perfect (exact probabilities), 1 = worst case. Below 0.25 is generally acceptable."
  gap_confiance: "Gap between average predicted confidence and actual observed accuracy. Positive = overconfidence (model overestimates its certainty), negative = underconfidence. Ideally close to 0."
  statut_calibration: "Model calibration status: OK if the gap is small, Overconfident if the model overestimates its probabilities, Underconfident if it underestimates them."
  calib_mae: >-
    MAE (Mean Absolute Error): average absolute error between predicted ŷ and actual y.

    MAE = mean(|ŷ − y|)

    Lower is better.
    Same unit as the target variable.
  calib_rmse: >-
    RMSE (Root Mean Square Error): square root of the mean squared error.

    RMSE = √(mean((ŷ − y)²))

    Penalises large errors more than MAE.
    Same unit as the target variable. Lower is better.
  calib_r2: >-
    R² (coefficient of determination): share of variance explained by the model.

    R² = 1 − SS_res / SS_tot
    SS_res = Σ(ŷ − y)²,  SS_tot = Σ(y − ȳ)²

    1.0 = perfect model · 0 = no better than average · negative = worse than average.
    Ideally > 0.80.
  calib_biais: >-
    Systematic model bias: mean of residuals (ŷ − y).

    Bias = mean(ŷ − y)

    Positive → model over-estimates on average.
    Negative → model under-estimates on average.
    Close to 0 → no systematic bias (good calibration).

    Status: 🟢 OK if |relative bias| < 10% of the std dev of observed y,
    🟡 Over-estimation or Under-estimation otherwise.
  confiance_moyenne: "Average maximum probability returned by the model for its predictions. Indicates how 'confident' the model is on average."
  p25_confiance: "25th confidence percentile: 25% of predictions have a confidence below this value."
  p75_confiance: "75th confidence percentile: 75% of predictions have a confidence below this value."
  tendance_performance: "Performance comparison between the 1st and 2nd half of the selected period. A drop indicates potential model drift."

