    | Variable | Default | Description |
    |---|---|---|
    | `GRAFANA_PUBLIC_URL` | `http://localhost:3000` | Grafana interface |
    | `MINIO_CONSOLE_PUBLIC_URL` | `http://localhost:9011` | MinIO console |
