    | `MLFLOW_ADMIN_USER` | `admin` | MLflow login |
    | `MLFLOW_ADMIN_PASSWORD` | *(generated)* | MLflow password |

    Secrets are automatically generated by `scripts/init_env.sh` on first deployment.

