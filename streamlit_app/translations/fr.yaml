      - 🟢 **ok** : PSI < 0.1 — distribution stable

      - 🟡 **warning** : 0.1 ≤ PSI < 0.2 — changement modéré

      - 🔴 **critical** : PSI ≥ 0.2 — changement majeur, ré-entraînement recommandé


      Calculé sur les **5 000 dernières prédictions** de la période sélectionnée via
      une approximation gaussienne des bins baseline.


