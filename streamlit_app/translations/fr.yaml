    col_status: Statut
    col_status_help: '🟢 Production : version principale. 🟠 A/B (x%) : reçoit x% du
      trafic en test A/B. 🟣 Shadow : reçoit les requêtes sans retourner sa prédiction
      au client. ✅ Actif : disponible mais non en production. ⚫ Inactif : désactivé.'
    col_creator: Créateur
    col_creator_help: Utilisateur ayant uploadé ce modèle.
    col_created_at: Créé le
    col_created_at_help: Date d'upload du modèle (heure locale).
    col_last_pred: Dernière préd.
    col_last_pred_help: Date et heure de la dernière prédiction servie par ce modèle.
    col_accuracy_eval: Accuracy (eval)
    col_accuracy_eval_help: 'Accuracy = (vrais positifs + vrais négatifs) / total
      des observations.


      Mesure la proportion de prédictions correctes sur le jeu de test (hold-out)
      séparé avant l''entraînement.


      • 1.0 → 100 % de prédictions correctes

      • 0.5 → équivalent à un tirage aléatoire sur 2 classes


      ⚠️ Trompeuse sur des classes très déséquilibrées : un modèle qui prédit toujours
      la classe majoritaire peut afficher 0.95 sans rien apprendre. Dans ce cas, préférer
      le F1. Métrique classification uniquement.'
    col_auc_eval: AUC (eval)
    col_f1_eval: F1 (eval)
    col_f1_eval_help: 'F1 = 2 × (Précision × Rappel) / (Précision + Rappel)


      • Précision = parmi les exemples prédits positifs, combien le sont vraiment.

      • Rappel = parmi les exemples réellement positifs, combien sont détectés.


      Le F1 est la moyenne harmonique des deux : il pénalise fortement un score très
      faible sur l''un ou l''autre.


      • 1.0 → précision et rappel parfaits

      • 0.0 → modèle inutilisable


      Recommandé quand les classes sont déséquilibrées ou quand les faux négatifs
      et faux positifs ont un coût différent (ex : détection de fraude, diagnostic
      médical). Métrique classification uniquement.'
    col_r2_eval: R² (eval)
    col_r2_eval_help: 'R² = 1 − (Σ(y − ŷ)²) / (Σ(y − ȳ)²)


      Mesure la part de variance de la variable cible expliquée par le modèle, calculée
      sur le jeu de test (eval).


      • 1.0 → le modèle prédit parfaitement toutes les valeurs

      • 0.0 → le modèle n''explique rien (équivalent à prédire la moyenne)

      • < 0 → le modèle est moins bon que de prédire la moyenne — signe d''un problème
      (sur-régularisation, mauvais features, bug)


      ⚠️ Comparer avec les métriques live en production pour détecter le surapprentissage.
      Métrique régression uniquement.'
    col_rmse_eval: RMSE (eval)
    col_rmse_eval_help: 'RMSE = √( Σ(y − ŷ)² / n )


      Erreur quadratique moyenne, exprimée dans la même unité que la variable cible.
      Calculée sur le jeu de test (eval).


      • Un RMSE de 2.5 sur un prix en € signifie que le modèle se trompe en moyenne
      de ±2.5 €.

      • Plus la valeur est faible, meilleur est le modèle.

      • Pas de borne supérieure : dépend de l''échelle de la cible.


      Le RMSE pénalise davantage les grandes erreurs que la MAE (Mean Absolute Error),
      car les écarts sont mis au carré avant la racine. Métrique régression uniquement.'
