# docker/haproxy-postgres.cfg
#
# Routeur HAProxy devant le cluster Patroni (PostgreSQL HA).
#
# Rôle dans l'architecture anti-SPOF :
#   Patroni élit dynamiquement un primary parmi ses nœuds. Après un failover,
#   l'adresse IP du primary change. HAProxy interroge l'API REST de chaque nœud
#   Patroni (port 8008) toutes les 3 s pour savoir qui est le primary courant.
#   PgBouncer et Streamlit pointent sur HAProxy — ils ne voient jamais le failover.
#
# Ports exposés :
#   5432 → writes (primary uniquement)
#   5433 → reads  (replicas hot_standby uniquement)
#   8404 → stats HAProxy (monitoring + healthcheck Docker)
#
# Principe du healthcheck Patroni :
#   GET /primary  → HTTP 200 si ce nœud est le primary élu
#   GET /replica  → HTTP 200 si ce nœud est un replica hot_standby
#   GET /health   → HTTP 200 si Patroni est vivant (quel que soit le rôle)
#   Ces endpoints sont exposés par chaque nœud Patroni sur le port 8008.

global
    log         stdout format raw local0 info
    maxconn     1000

    # Activer le socket de stats pour la gestion à chaud
    # (permet : haproxy -f /etc/haproxy/haproxy.cfg -sf <pid>)
    stats socket /var/run/haproxy/admin.sock mode 660 level admin

defaults
    log         global
    mode        tcp         # mode TCP (pas HTTP) : HAProxy proxie le protocole PostgreSQL
    option      tcplog
    option      dontlognull

    timeout connect  5s     # timeout connexion vers le backend
    timeout client   30s    # timeout inactivité côté client (PgBouncer)
    timeout server   30s    # timeout inactivité côté serveur (PostgreSQL)
    timeout check    5s     # timeout des healthchecks REST

    # Retenter sur le prochain serveur si la connexion échoue
    retries         3

# ─────────────────────────────────────────────────────────────
# FRONTEND WRITES (port 5432) → primary Patroni uniquement
#
# Toutes les connexions entrantes sur ce port sont routées vers
# le backend patroni_primary. Un seul nœud répond 200 à GET /primary
# à un instant donné — celui qui détient le bail leader etcd.
# ─────────────────────────────────────────────────────────────
frontend postgres_write
    bind *:5432
    default_backend patroni_primary

# ─────────────────────────────────────────────────────────────
# FRONTEND READS (port 5433) → replicas Patroni uniquement
#
# Utilisé par pgbouncer-read pour les requêtes analytics et monitoring.
# Les requêtes read-only sont distribuées sur tous les replicas disponibles.
# Si aucun replica n'est disponible (cluster à 1 seul nœud), ce port
# ne répond pas — comportement attendu.
# ─────────────────────────────────────────────────────────────
frontend postgres_read
    bind *:5433
    default_backend patroni_replicas

# ─────────────────────────────────────────────────────────────
# STATS HAProxy (port 8404)
#
# Interface web de monitoring : http://haproxy-postgres:8404/stats
# Affiche l'état de chaque backend (UP/DOWN), le nombre de connexions
# actives, les taux d'erreurs et les temps de réponse.
#
# Utile pour :
#   - Healthcheck Docker (wget http://localhost:8404/stats)
#   - Dashboard Grafana (scraping des métriques HAProxy)
#   - Vérification manuelle après un failover
# ─────────────────────────────────────────────────────────────
frontend stats
    bind *:8404
    mode http
    stats enable
    stats uri /stats
    stats refresh 5s
    stats show-legends
    stats show-node

# ─────────────────────────────────────────────────────────────
# BACKEND WRITES : primary Patroni
#
# option httpchk : HAProxy envoie "GET /primary HTTP/1.1" sur le port 8008
# de chaque serveur PostgreSQL. Seul le primary élu répond HTTP 200.
# Les replicas répondent HTTP 503 à /primary → retirés du pool de writes.
#
# Paramètres de détection de panne :
#   inter 3s  : healthcheck toutes les 3 secondes
#   fall 3    : marquer DOWN après 3 échecs consécutifs (~9 s)
#   rise 2    : marquer UP après 2 succès consécutifs (~6 s de récupération)
#
# on-marked-down shutdown-sessions :
#   Ferme immédiatement les connexions actives vers un nœud marqué DOWN.
#   Nécessaire pour que PgBouncer reconnecte vers le nouveau primary sans attendre.
# ─────────────────────────────────────────────────────────────
backend patroni_primary
    option  httpchk GET /primary
    http-check expect status 200
    default-server inter 3s fall 3 rise 2 on-marked-down shutdown-sessions
    server  patroni-1 patroni-1:5432 check port 8008
    server  patroni-2 patroni-2:5432 check port 8008

# ─────────────────────────────────────────────────────────────
# BACKEND READS : replicas Patroni (hot_standby)
#
# GET /replica → HTTP 200 uniquement sur les nœuds en hot_standby.
# Si un replica est promu primary suite à un failover, il ne répond
# plus à /replica et est automatiquement retiré du pool de reads.
# Le nouveau primary répond à /primary → basculé dans le pool de writes.
#
# balance roundrobin : distribution équitable entre tous les replicas actifs.
# ─────────────────────────────────────────────────────────────
backend patroni_replicas
    balance roundrobin
    option  httpchk GET /replica
    http-check expect status 200
    default-server inter 3s fall 3 rise 2
    server  patroni-1 patroni-1:5432 check port 8008
    server  patroni-2 patroni-2:5432 check port 8008
