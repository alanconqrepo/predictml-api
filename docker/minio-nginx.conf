# docker/minio-nginx.conf
#
# Load balancer Nginx devant le cluster MinIO distribué (4 nœuds).
#
# Rôle dans l'architecture anti-SPOF :
#   L'API, MLflow et tout client S3 pointent sur ce proxy (port 9000).
#   Si un nœud MinIO tombe, Nginx le retire du pool (passive health check).
#   MinIO gère la redondance en interne via erasure coding : les 3 nœuds
#   restants peuvent reconstruire les fragments du nœud manquant.
#
# Active health checks (Nginx Plus) :
#   La version open-source de Nginx utilise des passive health checks :
#   un nœud est marqué "down" seulement après un échec de proxy réel.
#   Pour des active health checks (vérification proactive), il faudrait
#   Nginx Plus ou remplacer ce Nginx par HAProxy (qui les supporte nativement).

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # Désactiver les logs d'accès pour les healthchecks MinIO (très verbeux)
    map $request_uri $loggable {
        ~^/minio/health  0;
        default          1;
    }
    access_log /var/log/nginx/access.log combined if=$loggable;

    # --- Pool des 4 nœuds MinIO ---
    # least_conn distribue vers le nœud avec le moins de connexions actives.
    # En mode distribué MinIO, n'importe quel nœud peut servir n'importe
    # quel objet — la distribution des données est transparente pour le client.
    upstream minio_api {
        least_conn;
        server minio-1:9000;
        server minio-2:9000;
        server minio-3:9000;
        server minio-4:9000;

        # Keepalive : réutilise les connexions TCP vers MinIO.
        # Réduit la latence sur les uploads fréquents de prédictions ou de modèles.
        keepalive 16;
    }

    # Console MinIO (interface d'administration web).
    # Une seule instance suffit pour l'administration — toutes les consoles
    # sont équivalentes dans un cluster distribué.
    upstream minio_console {
        server minio-1:9001;
        server minio-2:9002;
        server minio-3:9003;
        server minio-4:9004;
    }

    # --- API S3-compatible (port 9000) ---
    # Utilisé par : API FastAPI (upload/download modèles .pkl),
    #              MLflow (artifacts), MinIO Client (mc mirror)
    server {
        listen 9000;

        # Les modèles ML peuvent être volumineux (XGBoost, ensembles).
        # 500 MB couvre les cas courants ; ajuster si nécessaire.
        client_max_body_size 500m;

        # MinIO requiert que le header Host soit préservé tel quel
        # pour le routing interne du mode distribué.
        proxy_set_header Host              $http_host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Désactiver le buffering pour les uploads de modèles volumineux.
        # Avec buffering activé, Nginx attendrait de recevoir tout le corps
        # avant de le transmettre à MinIO — risque d'OOM sur gros fichiers.
        proxy_buffering         off;
        proxy_request_buffering off;

        location / {
            proxy_pass http://minio_api;

            # Timeout généreux pour les gros modèles (> 100 MB peuvent prendre ~30 s)
            proxy_connect_timeout  5s;
            proxy_read_timeout     120s;
            proxy_send_timeout     120s;

            # Activer HTTP/1.1 pour le keepalive upstream
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # Healthcheck du cluster MinIO (agrégé sur tous les nœuds).
        # Retourne 200 uniquement si le cluster est en état de servir des requêtes.
        # Utilisé par le healthcheck Docker du service minio-nginx.
        location /minio/health/cluster {
            proxy_pass http://minio_api;
            access_log off;
        }

        location /minio/health/live {
            proxy_pass http://minio_api;
            access_log off;
        }
    }

    # --- Console d'administration MinIO (port 9001) ---
    # Interface web pour visualiser les buckets, objets, policies.
    # La console utilise des WebSockets pour le rafraîchissement en temps réel.
    server {
        listen 9001;

        location / {
            proxy_pass http://minio_console;

            proxy_set_header Host              $http_host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;

            # WebSocket requis pour la console MinIO (rafraîchissement live)
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_read_timeout 300s;
        }
    }
}
