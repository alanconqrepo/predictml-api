# PostgreSQL Client Authentication Configuration
# TYPE  DATABASE        USER            ADDRESS                 METHOD

# Unix domain socket connections
local   all             all                                     trust

# IPv4 localhost
host    all             all             127.0.0.1/32            trust

# IPv6 localhost
host    all             all             ::1/128                 trust

# Unix socket replication
local   replication     all                                     trust

# IPv4 localhost replication
host    replication     all             127.0.0.1/32            trust

# IPv6 localhost replication
host    replication     all             ::1/128                 trust

# Docker internal network — password auth (covers pgbouncer, mlflow, streamlit, workers)
host    all             all             all                     scram-sha-256

# Streaming replication from replica container (Docker internal network)
host    replication     postgres        all                     scram-sha-256
