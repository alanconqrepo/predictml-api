# docker/keepalived-master.conf
#
# Configuration Keepalived pour la machine MASTER (Nginx actif).
# À installer sur l'HÔTE (pas dans Docker) : /etc/keepalived/keepalived.conf
#
# Rôle dans l'architecture anti-SPOF (SPOF 3 — Nginx) :
#   Keepalived implémente le protocole VRRP entre deux machines.
#   Une VIP (Virtual IP) flotte sur la machine MASTER. Si la machine MASTER
#   devient injoignable, la machine BACKUP s'assigne la VIP automatiquement.
#   Le DNS externe pointe sur la VIP — transparent pour les clients.
#
# Prérequis :
#   - 2 machines sur le même sous-réseau L2 (même VLAN ou même switch)
#   - Nginx qui tourne dans Docker sur chaque machine
#   - apt install -y keepalived  (sur les deux machines)
#   - Adapter : interface, virtual_ipaddress, auth_pass
#
# Démarrage :
#   systemctl enable keepalived
#   systemctl start keepalived
#
# Vérification :
#   ip addr show eth0 | grep <VIP>   # doit apparaître sur la machine MASTER
#   systemctl status keepalived

# Healthcheck Nginx : vérifie que Nginx répond sur le port 80.
# Si ce script retourne non-zéro, Keepalived retire 20 points de priorité
# à cette instance, ce qui déclenche la bascule vers la machine BACKUP.
vrrp_script chk_nginx {
    script "curl -sf http://localhost:80/health || exit 1"
    interval  2     # vérification toutes les 2 secondes
    weight   -20    # pénalité si Nginx ne répond pas (100 - 20 = 80 < priorité BACKUP 90)
    fall      2     # 2 échecs consécutifs avant de déclencher la pénalité
    rise      2     # 2 succès consécutifs pour lever la pénalité
}

vrrp_instance VI_PREDICTML {
    state     MASTER          # cette machine démarre en état MASTER
    interface eth0             # adapter au nom de l'interface réseau (ip addr show)
    virtual_router_id 51       # doit être identique sur MASTER et BACKUP (0-255)
    priority  100              # priorité MASTER > priorité BACKUP (90)
    advert_int 1               # envoi d'un heartbeat VRRP toutes les 1 seconde

    authentication {
        auth_type PASS
        # Changer ce mot de passe — il doit être identique sur MASTER et BACKUP
        auth_pass predictml_vrrp_secret
    }

    # VIP flottante : adapter à votre sous-réseau.
    # Le DNS externe (ex: api.monentreprise.com) doit pointer sur cette IP.
    # Ne pas utiliser une IP déjà assignée à une interface physique.
    virtual_ipaddress {
        192.168.1.100/24       # adapter au sous-réseau de vos machines
    }

    track_script {
        chk_nginx
    }

    # Notification email optionnelle (nécessite postfix/sendmail sur l'hôte)
    # notify_master  /etc/keepalived/notify.sh MASTER
    # notify_backup  /etc/keepalived/notify.sh BACKUP
    # notify_fault   /etc/keepalived/notify.sh FAULT
}
