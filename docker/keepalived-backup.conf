# docker/keepalived-backup.conf
#
# Configuration Keepalived pour la machine BACKUP (Nginx en attente).
# À installer sur l'HÔTE (pas dans Docker) : /etc/keepalived/keepalived.conf
#
# Différences vs keepalived-master.conf :
#   state    : BACKUP (pas MASTER)
#   priority : 90     (inférieur au MASTER = 100)
#
# La machine BACKUP prend la VIP uniquement si :
#   - La machine MASTER cesse d'envoyer des heartbeats VRRP (panne machine)
#   - OU le script chk_nginx échoue sur le MASTER (Nginx down + pénalité -20 → 80 < 90)
#
# Bascule : ~2-3 secondes (advert_int=1 s × 3 annonces manquées)
# Retour au MASTER : automatique quand la machine MASTER revient (preempt_delay)

vrrp_script chk_nginx {
    script "curl -sf http://localhost:80/health || exit 1"
    interval  2
    weight   -20
    fall      2
    rise      2
}

vrrp_instance VI_PREDICTML {
    state     BACKUP          # cette machine démarre en état BACKUP
    interface eth0             # adapter au nom de l'interface réseau
    virtual_router_id 51       # DOIT être identique à la machine MASTER
    priority  90               # inférieur au MASTER (100) pour la priorité normale
    advert_int 1

    # preempt_delay : attend 30 s après le retour du MASTER avant de lui rendre la VIP.
    # Évite les bascules en boucle si le MASTER est instable.
    preempt_delay 30

    authentication {
        auth_type PASS
        # DOIT être identique à la machine MASTER
        auth_pass predictml_vrrp_secret
    }

    virtual_ipaddress {
        192.168.1.100/24       # DOIT être identique à la machine MASTER
    }

    track_script {
        chk_nginx
    }
}
