name: CI

on:
  pull_request:
  push:

jobs:
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install quality tools
        run: pip install ruff black

      - name: Lint with ruff
        run: ruff check src/

      - name: Check formatting with black
        run: black --check src/

  # Tests use an in-memory SQLite database (conftest.py overrides all DB connections).
  # No PostgreSQL or MinIO service containers are required.
  test-linux:
    name: Tests (Linux)
    runs-on: ubuntu-latest

    env:
      MINIO_ENDPOINT: localhost:9002
      MINIO_ACCESS_KEY: ${{ secrets.CI_MINIO_ACCESS_KEY }}
      MINIO_SECRET_KEY: ${{ secrets.CI_MINIO_SECRET_KEY }}
      SECRET_KEY: ${{ secrets.CI_SECRET_KEY }}
      ADMIN_TOKEN: ${{ secrets.CI_ADMIN_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-cov httpx anyio pytest-asyncio email-validator fakeredis aiosqlite asyncpg

      - name: Run tests
        run: pytest tests/ -v --tb=short -p no:warnings

  test-windows:
    name: Tests (Windows)
    runs-on: windows-latest

    env:
      MINIO_ENDPOINT: localhost:9002
      MINIO_ACCESS_KEY: ${{ secrets.CI_MINIO_ACCESS_KEY }}
      MINIO_SECRET_KEY: ${{ secrets.CI_MINIO_SECRET_KEY }}
      SECRET_KEY: ${{ secrets.CI_SECRET_KEY }}
      ADMIN_TOKEN: ${{ secrets.CI_ADMIN_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-cov httpx anyio pytest-asyncio email-validator fakeredis aiosqlite asyncpg

      - name: Run tests
        run: pytest tests/ -v --tb=short -p no:warnings
