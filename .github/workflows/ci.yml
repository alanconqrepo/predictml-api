name: CI

on:
  pull_request:
  push:

jobs:
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install quality tools
        run: pip install ruff black

      - name: Lint with ruff
        run: ruff check src/

      - name: Check formatting with black
        run: black --check src/

  test:
    name: Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres_secure_password_123
          POSTGRES_DB: sklearn_api
        ports:
          - 5434:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres_secure_password_123@localhost:5434/sklearn_api
      MINIO_ENDPOINT: localhost:9002
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minio_secure_password_123
      SECRET_KEY: test-secret-key-for-ci
      ADMIN_TOKEN: ZC_W_-mcw-01l5W5fN8VFx-h4WornlnxwAtiQutT2BA

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-cov httpx anyio pytest-asyncio email-validator

      - name: Run tests
        run: python -m pytest tests/ -v
