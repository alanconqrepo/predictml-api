name: Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres_secure_password_123@localhost:5434/sklearn_api
      MINIO_ENDPOINT: localhost:9002
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minio_secure_password_123
      SECRET_KEY: test-secret-key-for-ci
      ADMIN_TOKEN: ZC_W_-mcw-01l5W5fN8VFx-h4WornlnxwAtiQutT2BA

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt ".[dev]"

      - name: Run tests
        run: python -m pytest tests/ -v
